  <style>
    html, body { margin:0; padding:0; min-height:100%; background:#e9eee9; }
    * { -webkit-tap-highlight-color: transparent; }
    body{
      font-family:'SF Pro Display', -apple-system, 'Segoe UI', system-ui, sans-serif;
      background-color:#e9eee9;
      background-image:
        radial-gradient(120% 90% at 50% -10%, rgba(255,255,255,0.55), rgba(255,255,255,0) 55%),
        radial-gradient(90% 60% at 100% 0%, rgba(120,170,140,0.18), rgba(120,170,140,0) 60%);
      background-attachment:fixed;
    }
    input, textarea, button { font-family:inherit; }
    ::-webkit-scrollbar{ display:none; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button{ -webkit-appearance:none; margin:0; }
    input[type=number]{ -moz-appearance:textfield; }
    @keyframes pop { from{transform:scale(.96);opacity:0} to{transform:scale(1);opacity:1} }
    @keyframes sheet { from{transform:translateY(24px);opacity:0} to{transform:translateY(0);opacity:1} }
    @keyframes toastin { from{transform:translateY(-14px);opacity:0} to{transform:translateY(0);opacity:1} }
    @keyframes toastout { from{transform:translateY(0);opacity:1} to{transform:translateY(-16px);opacity:0} }
    @keyframes cardIn { from{opacity:0; transform:translateY(10px) scale(.98)} to{opacity:1; transform:none} }
    @keyframes cardInX { from{opacity:0; transform:translateX(-34px)} to{opacity:1; transform:none} }
    @keyframes staggerUp { from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)} }
    @keyframes ringtext { from{opacity:0; transform:translateY(-7px)} to{opacity:1; transform:translateY(0)} }
    @keyframes cardOut { from{opacity:1; transform:none} to{opacity:0; transform:translateY(6px) scale(.98)} }
    @keyframes monthIn { from{opacity:0; transform:translateX(var(--mx,12px))} to{opacity:1; transform:translateX(0)} }
    @keyframes popIn { from{transform:scale(.94);opacity:0} to{transform:scale(1);opacity:1} }
    @keyframes popOut { from{transform:scale(1);opacity:1} to{transform:scale(.96);opacity:0} }
    @keyframes dimIn { from{opacity:0} to{opacity:1} }
    @keyframes dimOut { from{opacity:1} to{opacity:0} }
    @keyframes menuFwd { from{opacity:0; transform:translateX(26px)} to{opacity:1; transform:translateX(0)} }
    @keyframes menuBack { from{opacity:0; transform:translateX(-26px)} to{opacity:1; transform:translateX(0)} }
    @keyframes spin { to{ transform: rotate(360deg); } }
    button:not(:disabled){ -webkit-tap-highlight-color: transparent; }
    button:not(:disabled):active{ transform: scale(0.96); transition: transform .1s cubic-bezier(.34,1.3,.5,1); }
    .mrow{ transition: background .12s ease; }
    .mrow:not(:disabled):active{ transform:none; background: rgba(255,255,255,0.16); }
    @media (hover:hover){ .mrow:hover{ background: rgba(255,255,255,0.12); } }
    @media (prefers-reduced-motion: reduce){ *{animation:none!important;transition:none!important} button:active{transform:none!important} }
    .no-sb{ scrollbar-width:none; -ms-overflow-style:none; }
    .no-sb::-webkit-scrollbar{ width:0; height:0; display:none; }
  </style>

  if (pct >= 80) return {

function relTime(ms) {

  if (diff < 90000) return "לפני דקה";
  if (diff < 3600000) return "לפני " + Math.round(diff / 60000) + " דקות";

    now = new Date();
  const hhmm = dt.toLocaleTimeString("he-IL", {

    minute: "2-digit"

/* ================= שכבת סנכרון ענן (Cloudflare Worker + KV) =================

   seed רץ רק אם אין נתונים בענן ואין מקומית. כל שינוי נדחף לענן (debounced),
   ואם אין רשת — נשמר מקומית ומסתנכרן כשחוזר חיבור. */
function syncCfg() {
  try {

  } catch (_) {

  }

    return JSON.parse(localStorage.getItem(META_KEY) || "{}") || {};
  } catch (_) {
    return {};
  }
}

}
async function cloudGet() {

    c = syncCfg();

      "x-sync-id": c.syncId

}
async function cloudPut(env) {

    c = syncCfg();

  const r = await fetch(base + "/data", {
    method: "PUT",
    headers: {
      "content-type": "application/json",
      "x-sync-id": c.syncId

    body: JSON.stringify(env)

    const server = await r.json().catch(() => null);
    const e = new Error("conflict");

  } catch (_) {

  }

/* Hook: מנהל bootstrap (משיכה ראשונית), דחיפה בכל שינוי, ריטריי כשחוזרת רשת */
function useCloudSync(data, setData, onRemote) {
  const [sync, setSync] = useState(() => ({
    status: syncEnabled() ? "connecting" : "off",
    at: null,
    error: null
  }));
  const [booting, setBooting] = useState(() => {
    try {
      return syncEnabled() && !localStorage.getItem(KEY);
    } catch (_) {
      return false;
    }
  });
  const revRef = useRef(loadMeta().rev || 0);
  const skipPush = useRef(true);
  const pushTimer = useRef(null);
  const dirtyRef = useRef(false);
  const dataRef = useRef(data);
  useEffect(() => {
    dataRef.current = data;
  }, [data]);
  const pushNow = async d => {
    if (!syncEnabled()) return;
    const rev = (revRef.current || 0) + 1,
      now = Date.now();
    try {
      setSync(s => ({
        ...s,
        status: "saving"
      }));
      const res = await cloudPut({
        schema: SCHEMA,
        rev,
        updatedAt: now,
        data: d
      });
      revRef.current = res.rev || rev;
      saveMeta({
        rev: revRef.current,
        updatedAt: res.updatedAt || now
      });
      dirtyRef.current = false;
      setSync({
        status: "synced",
        at: Date.now(),
        error: null
      });
    } catch (e) {
      if (e.message === "conflict" && e.server && e.server.data) {
        skipPush.current = true;
        const m = migrate(e.server.data);
        setData(m);
        revRef.current = e.server.rev || rev;
        saveMeta({
          rev: revRef.current,
          updatedAt: e.server.updatedAt || now
        });
        try {
          localStorage.setItem(KEY, JSON.stringify(m));
        } catch (_) {}
        setSync({
          status: "synced",
          at: Date.now(),
          error: null
        });
        onRemote && onRemote("סונכרן ממכשיר אחר");
      } else {
        dirtyRef.current = true;
        setSync({
          status: "offline",
          at: null,
          error: String(e.message || e)
        });
      }
    }
  };
  useEffect(() => {
    // bootstrap פעם אחת
    let alive = true;
    if (!syncEnabled()) {
      setSync({
        status: "off"

      setBooting(false);
      return;
    }
    (async () => {
      try {
        const env = await cloudGet();
        if (!alive) return;
        if (env && env.data && !env.empty) {
          // בענן יש נתונים → מקור האמת
          skipPush.current = true;
          const m = migrate(env.data);
          setData(m);
          revRef.current = env.rev || 1;
          saveMeta({
            rev: revRef.current,
            updatedAt: env.updatedAt || Date.now()
          });
          try {
            localStorage.setItem(KEY, JSON.stringify(m));
          } catch (_) {}
          setSync({
            status: "synced",
            at: Date.now(),
            error: null
          });
        } else {
          // הענן ריק → מעלים את המקומי/seed פעם ראשונה
          const rev = (loadMeta().rev || 0) + 1,
            now = Date.now();
          const res = await cloudPut({
            schema: SCHEMA,
            rev,
            updatedAt: now,
            data: dataRef.current
          });
          revRef.current = res.rev || rev;
          saveMeta({
            rev: revRef.current,
            updatedAt: res.updatedAt || now
          });
          setSync({
            status: "synced",
            at: Date.now(),
            error: null
          });
        }
      } catch (e) {
        if (alive) setSync({
          status: "offline",
          at: null,
          error: String(e.message || e)
        });
      } finally {
        if (alive) setBooting(false);
      }
    })();
    return () => {
      alive = false;
    };
  }, []);
  useEffect(() => {
    // כתיבה לקאש + דחיפה מושהית לענן
    try {
      localStorage.setItem(KEY, JSON.stringify(data));
    } catch (_) {}
    if (skipPush.current) {
      skipPush.current = false;
      return;
    }
    if (!syncEnabled()) return;
    if (pushTimer.current) clearTimeout(pushTimer.current);
    pushTimer.current = setTimeout(() => pushNow(dataRef.current), 700);
  }, [data]);
  useEffect(() => {
    // ריטריי כשחוזרת רשת
    const on = () => {
      if (syncEnabled() && dirtyRef.current) pushNow(dataRef.current);
    };
    window.addEventListener("online", on);
    return () => window.removeEventListener("online", on);
  }, []);
  const forcePull = async () => {
    if (!syncEnabled()) return;
    try {
      setSync(s => ({
        ...s,
        status: "connecting"
      }));
      const env = await cloudGet();
      if (env && env.data && !env.empty) {
        skipPush.current = true;
        const m = migrate(env.data);
        setData(m);
        revRef.current = env.rev || 1;
        saveMeta({
          rev: revRef.current,
          updatedAt: env.updatedAt || Date.now()
        });
        try {
          localStorage.setItem(KEY, JSON.stringify(m));
        } catch (_) {}
      }
      setSync({
        status: "synced",
        at: Date.now(),
        error: null
      });
    } catch (e) {
      setSync({
        status: "offline",
        at: null,
        error: String(e.message || e)
      });
    }
  };
  const forcePush = () => pushNow(dataRef.current);
  return {
    sync,
    booting,
    forcePull,
    forcePush
  };
}
